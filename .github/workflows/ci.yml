name: Continuous Integration

on:
  pull_request:

# Least-privilege default for GITHUB_TOKEN across all jobs; none of them write
# to the repo (dependency-review only needs to read the dependency graph).
permissions:
  contents: read

concurrency:
  group: 'ci-${{ github.event.pull_request.number }}'
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  # Source-level static analysis. No build — these never need the artifact.
  # All checks share one dependency install (deps are the dominant cost). Each
  # check is guarded by `if: ${{ !cancelled() }}` so a failure in one still lets
  # the rest run and report — preserving the old matrix's fail-fast: false UX.
  static:
    name: Static checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        if: ${{ !cancelled() }}
        run: pnpm run type:check

      - name: Lint check
        if: ${{ !cancelled() }}
        run: pnpm run lint:check

      - name: Format check
        if: ${{ !cancelled() }}
        run: pnpm run format:check

      - name: Contrast (WCAG AA)
        if: ${{ !cancelled() }}
        run: pnpm run a11y:contrast

  # Unit tests (Vitest) for the framework-agnostic logic in src/lib. No build —
  # these run directly against the source.
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm run test

  # Blocks AI attribution (Co-Authored-By: Claude, Claude-Session, "Generated
  # with Claude Code", …) in commit messages and the PR title/description, per
  # CLAUDE.md. Zero deps, no build. fetch-depth: 0 so base..head resolves.
  attribution:
    name: No AI attribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Check commit messages and PR title/description
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: node helpers/ci/check-no-ai-attribution.mjs

  # Newly introduced vulnerable or incompatibly-licensed dependencies are
  # blocked at the PR that adds them.
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Review dependencies
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  # Single production build (astro build, incl. the zod frontmatter validation
  # in the content collection) producing the dist/ artifact every downstream
  # job reuses — so the build is never duplicated.
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Astro's build cache (incremental asset/image processing via sharp and the
      # webmanifest icon generation). Keyed on the inputs that change the output;
      # Astro re-validates entries by content hash, so a stale restore is safe.
      - name: Cache Astro build cache
        uses: actions/cache@v4
        with:
          path: |
            .astro
            node_modules/.astro
          key: astro-${{ runner.os }}-${{ hashFiles('src/**', 'content/**', 'astro.config.mjs', 'pnpm-lock.yaml') }}
          restore-keys: |
            astro-${{ runner.os }}-

      - name: Build
        run: pnpm run build

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 1

  # Build-output contracts on dist/: required distribution artifacts (RSS,
  # sitemap, manifest, core pages, social meta), URL parity with content/pl,
  # and the rendering-regression contract from the migration QA.
  build-contract:
    name: Build-output contract
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Verify distribution contract
        run: node helpers/ci/check-build-output.mjs

      - name: Verify URL parity with content/pl
        run: node helpers/ci/check-astro-url-parity.mjs

      - name: Verify rendering-regression contract
        run: node helpers/ci/check-astro-build-output.mjs

  # Internal link integrity across the built site (catches broken links and
  # broken redirects). External URLs are skipped to keep the gate deterministic.
  links:
    name: Link check
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Check internal links
        run: pnpm dlx linkinator@6.1.2 dist --recurse --skip "^https?://(?!localhost)"

  # Rendered-page audit (Lighthouse) of the app-owned pages: accessibility and
  # SEO are gated; performance and best-practices are advisory. ubuntu-latest
  # ships Chrome, which Lighthouse auto-detects.
  lighthouse:
    name: Lighthouse
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Serve build output
        run: |
          pnpm dlx http-server@14.1.1 dist -p 9000 -s &
          npx --yes wait-on@8.0.1 http://localhost:9000/ --timeout 30000

      - name: Run Lighthouse CI
        run: pnpm dlx @lhci/cli@0.15.1 autorun --config=lighthouserc.cjs

  # End-to-end and axe-core accessibility smoke tests (Playwright) against the
  # built site served by `astro preview`. Reuses the dist/ artifact.
  e2e:
    name: End-to-end (Playwright)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright tests
        run: pnpm run test:e2e
