name: TEMP Astro Production Deploy

# TEMPORARY: one-off deploy of the Astro build to the live GitHub Pages site for
# manual verification before cutover. Triggered by pushing this file on the
# migration branch (and manual dispatch). Production is restored by re-running
# the Gatsby cd.yml. Remove this workflow once verification is done.
# Re-trigger: redeploy after list marker + breadcrumb ellipsis refinements.
on:
  workflow_dispatch:
  push:
    branches: ['claude/astro-migration']
    paths: ['.github/workflows/astro-deploy-temp.yml']

permissions:
  contents: read
  pages: write
  id-token: write

# Share the production deploy concurrency group so this never races cd.yml.
concurrency:
  group: 'cd'
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: 'astro/.nvmrc'
          cache: 'pnpm'
          cache-dependency-path: 'astro/pnpm-lock.yaml'

      - name: Install dependencies
        working-directory: astro
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: astro
        run: pnpm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: astro/dist

  deploy:
    name: Deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
