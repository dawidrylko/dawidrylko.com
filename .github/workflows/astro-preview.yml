name: Astro Preview Build

# Manual preview build for the Astro migration (astro/). Builds the project,
# runs the full verification suite, and publishes the dist/ as a downloadable
# artifact for inspection. It deliberately does NOT deploy to GitHub Pages:
# this repo serves a single Pages site on the custom domain dawidrylko.com, so
# production stays on Gatsby until the cutover phase.
on:
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  preview:
    name: Preview build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: 'astro/.nvmrc'
          cache: 'pnpm'
          cache-dependency-path: 'astro/pnpm-lock.yaml'

      - name: Install dependencies
        working-directory: astro
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: astro
        run: pnpm run build

      - name: Audit design-token contrast (WCAG AA)
        run: node helpers/a11y-contrast/check-contrast.mjs astro/src/styles/main.css

      - name: Check URL parity with content/pl
        run: node helpers/ci/check-astro-url-parity.mjs

      - name: Check internal links
        run: pnpm dlx linkinator astro/dist --recurse --skip "^https?://(?!localhost)"

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: astro-preview-dist
          path: astro/dist
