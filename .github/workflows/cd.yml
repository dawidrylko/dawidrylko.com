name: Continuous Deployment

on:
  push:
    branches: ['master']

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'cd'
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Astro's build cache (incremental asset/image processing via sharp and the
      # webmanifest icon generation). Keyed on the inputs that change the output;
      # Astro re-validates entries by content hash, so a stale restore is safe.
      - name: Cache Astro build cache
        uses: actions/cache@v6
        with:
          path: |
            .astro
            node_modules/.astro
          key: astro-${{ runner.os }}-${{ hashFiles('src/**', 'content/**', 'astro.config.mjs', 'pnpm-lock.yaml') }}
          restore-keys: |
            astro-${{ runner.os }}-

      - name: Build
        run: pnpm run build

      - name: Validate structured-data graph
        run: pnpm run check:structured-data

      - name: Verify Google Search quality
        uses: SilesianSolutions/search-quality-kit/action@v0
        with:
          node-version: '24'
          package-manager: pnpm
          config: search-quality.config.ts
          summary: 'true'
          upload-artifact: 'true'

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    name: Deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: deploy
    if: "!contains(github.event.head_commit.message, '[skip notify]')"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Notifications run after a successful deploy; a failure here must never
      # roll back or block the already-published build, so they are non-blocking.
      - name: Notify Bing via URL Submission API
        continue-on-error: true
        env:
          BING_API_KEY: ${{ secrets.BING_API_KEY }}
        working-directory: 'scripts/notify'
        shell: bash
        run: ./bing.sh
