name: Continuous Deployment

on:
  push:
    branches: ['master']

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'cd'
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: latest

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    name: Deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: deploy
    if: "!contains(github.event.head_commit.message, '[skip notify]')"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Notifications run after a successful deploy; a failure here must never
      # roll back or block the already-published build, so they are non-blocking.
      - name: Notify Google via Indexing API
        continue-on-error: true
        env:
          GOOGLE_JSON_KEY_FILE: ${{ secrets.GOOGLE_JSON_KEY_FILE }}
        working-directory: '.github/scripts'
        shell: bash
        run: ./google.sh

      - name: Notify Bing via URL Submission API
        continue-on-error: true
        env:
          BING_API_KEY: ${{ secrets.BING_API_KEY }}
        working-directory: '.github/scripts'
        shell: bash
        run: ./bing.sh
