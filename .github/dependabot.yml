version: 2
updates:
  - package-ecosystem: 'npm' # covers npm/yarn/pnpm; resolved via pnpm-lock.yaml
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '03:00'
      timezone: 'Europe/Warsaw'
    # Single grouped PR for every weekly version update.
    open-pull-requests-limit: 1
    assignees:
      - 'dawidrylko'
    rebase-strategy: 'auto'
    commit-message:
      prefix: 'chore'
      include: 'scope'
    groups:
      all-dependencies:
        applies-to: version-updates
        patterns:
          - '*'
    ignore:
      # katex is intentionally held back for now — a newer major is a breaking
      # change we are not ready to adopt yet. Bump it manually when ready.
      - dependency-name: 'katex'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '03:00'
      timezone: 'Europe/Warsaw'
    open-pull-requests-limit: 1
    assignees:
      - 'dawidrylko'
    rebase-strategy: 'auto'
    commit-message:
      prefix: 'ci'
      include: 'scope'
    groups:
      all-actions:
        applies-to: version-updates
        patterns:
          - '*'
