packages: []

allowBuilds:
  esbuild: true
  sharp: true

# pnpm's default minimum-release-age supply-chain gate would make
# `pnpm install --frozen-lockfile` reject freshly published deps (e.g. a new
# astro release); disable it so the pinned lockfile always installs.
minimumReleaseAge: 0

onlyBuiltDependencies:
  - esbuild
  - sharp
